{% extends "auth/_shell.html" %}
{% block title %}Sign in — AIDSTATION{% endblock %}

{% block content %}
<p class="eyebrow accent">● Welcome back</p>
<h1 class="auth-title">Sign in.</h1>
<p class="auth-sub">Race day's not getting any further away.</p>

<form method="post" action="{{ url_for('auth.login', next=request.args.get('next')) }}" class="auth-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label class="field">
    <span class="lbl">Username</span>
    <input type="text" class="form-control" name="username" value="{{ username }}"
           autocomplete="username" required autofocus>
  </label>
  <label class="field">
    <span class="lbl auth-lbl-row">Password
      <a class="auth-lbl-link" href="{{ url_for('auth.forgot') }}">Forgot?</a></span>
    <input type="password" class="form-control" name="password"
           autocomplete="current-password" required>
  </label>
  <button type="submit" class="btn btn-primary auth-submit">
    Sign in <svg class="icon" width="12" height="12" aria-hidden="true"><use href="#i-arrow"></use></svg>
  </button>
</form>

{% if registration_open %}
<p class="auth-alt">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
{% endif %}
{% endblock %}
