<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AIDSTATION{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="auth-body">
<div class="container py-5" style="max-width: 460px;">
  <div class="text-center mb-4">
    <a class="navbar-brand wordmark lockup d-inline-flex" href="{{ url_for('auth.login') }}" aria-label="AIDSTATION home">
      <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true" style="width:48px;height:48px;">
        <path d="M26 30 L74 30 L67 84 Q 50 92, 33 84 Z" fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/>
        <line x1="26" y1="30" x2="74" y2="30" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
        <path d="M40 54 L48 60 L40 66" stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="53" y="55" width="9" height="10" fill="#E8893A"/>
      </svg>
      <span class="lockup-text ms-2"><span class="aid">AID</span><span class="station">STATION</span></span>
    </a>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
