const root = ReactDOM.createRoot(document.getElementById('root'));
// Defensive boot: the many in-browser Babel <script> files transpile
// asynchronously, so on a cold/cache-busted load this inline script can
// run a tick before every screen component is defined. Wait for a few
// sentinels (last-loaded files' exports) before first render to avoid a
// transient ReferenceError crashing <App>.
(function boot(tries) {
  var ready = typeof OnbAccount !== 'undefined'
    && typeof ScreenAriaRef !== 'undefined'
    && typeof LightAdmin !== 'undefined'
    && typeof ScreenRaceEvents !== 'undefined';
  if (ready || tries > 120) { root.render(<App />); return; }
  setTimeout(function () { boot(tries + 1); }, 25);
})(0);
</script>

<!-- Board-level theme toggle — flips every .screen to light via token override -->
<button id="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle board theme">◐ Dark</button>
<script>
(function () {
  var btn = document.getElementById('theme-toggle');
  var KEY = 'aidstation-board-theme';
  function apply(light) {
    document.body.classList.toggle('board-light', light);
    btn.setAttribute('aria-pressed', light ? 'true' : 'false');
    btn.textContent = light ? '☀ Light' : '◐ Dark';
  }
  apply(localStorage.getItem(KEY) === 'light');
  btn.addEventListener('click', function () {
    var now = !document.body.classList.contains('board-light');
    localStorage.setItem(KEY, now ? 'light' : 'dark');
    apply(now);
  });
})();
</script>
<script src="a11y-wire.js"></script>
