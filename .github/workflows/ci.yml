name: CI

# Runs the default (stubbed, $0) Python suite + the JS harness on every PR and
# push to main. The real-LLM smoke suite is gated separately (real-llm-smoke
# job) so the per-PR run stays free and side-effect-free — the smoke tests
# skip without ANTHROPIC_API_KEY via the requires_anthropic_api_key marker.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly real-LLM smoke (06:00 UTC). Only the real-llm-smoke job gates on
    # the schedule trigger; the unit jobs no-op on schedule.
    - cron: "0 6 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python unit suite (stubbed)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        # pytest is intentionally not in requirements.txt (runtime-lean image).
        run: pip install -r requirements.txt pytest
      - name: Run test suite
        # Real-LLM smoke files skip without ANTHROPIC_API_KEY (not set here).
        # Includes etl/tests/ (Layer 0 ETL parsers + discipline canon) —
        # psycopg2 is present via requirements.txt; these tests read the
        # source workbooks directly and need no live DB.
        run: python -m pytest tests/ etl/tests/ -q

  js-tests:
    name: JS harness (jsdom)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test

  layer0-gate:
    name: Layer 0 integrity gate
    # Stands up a throwaway Postgres and loads the latest committed genesis
    # baseline (etl/output/layer0_etl_v*.sql — a full pg_dump of live layer0,
    # schema + data, self-contained), then any post-baseline migrations
    # (etl/migrations/layer0/), and runs validate_layer0 against it — the DB-side
    # integrity gate (decision C, all checks FAIL with a sum_to_100 waiver
    # bucket). A FAIL here means the committed baseline has an unwaived integrity
    # violation to fix or waive; no live DB / Neon needed.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: layer0
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/layer0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Load genesis baseline snapshot
        # The committed snapshot is a full pg_dump of live layer0 (schema + data),
        # self-contained — no separate schema.sql. Strip the PG18 psql meta-commands
        # (\restrict / \unrestrict — the runner's psql client is < 18) and the
        # transaction_timeout GUC (defensive) so a raw dump loads with no
        # hand-editing of the committed file. The service is postgres:17 to match
        # prod Neon.
        run: |
          snapshot="$(ls etl/output/layer0_etl_v*.sql | sort -V | tail -1)"
          echo "Loading baseline: $snapshot"
          sed -E '/^\\restrict /d; /^\\unrestrict /d; /^SET transaction_timeout/d' "$snapshot" \
            | psql "$DATABASE_URL" -v ON_ERROR_STOP=1
      - name: Apply Layer 0 migrations
        # Post-baseline DB-native edits stack on the newest baseline
        # (sort -V | tail -1) in order. 0001-0022 are folded into the baseline
        # and archived (etl/_archive/pre_v1.7.0_baseline + pre_v1.9.0_baseline);
        # this dir is empty until the next migration lands. The gate then guards
        # baseline + migrations as the would-be-applied state before Neon. NOTE:
        # a live re-dump MUST be paired with archiving the baked migrations —
        # re-applying a verify-bearing migration on a converged baseline fails.
        run: |
          # Iterate the glob directly: with nullglob an empty dir yields zero
          # iterations. (Do NOT `ls $glob` — under nullglob an empty glob makes
          # `ls` run argument-less and list the cwd.) Zero-padded NNNN names
          # sort in apply order under default pathname expansion. The [0-9]*
          # prefix applies only the numbered migrations in-order from the
          # baseline (the gate proves they compose); underscore-prefixed helpers
          # like _apply_ledger.sql are apply-time infra, not gate migrations.
          shopt -s nullglob
          for m in etl/migrations/layer0/[0-9]*.sql; do
            echo "Applying migration: $m"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$m"
          done
      - name: Run validate_layer0 gate
        run: python -m etl.layer0.validate_layer0

  real-llm-smoke:
    name: Real-LLM smoke (Sonnet 4.6)
    # Costs real tokens — only on the nightly schedule or a manual dispatch,
    # never on every PR. Skips cleanly if the secret is unset.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt pytest
      - name: Run real-LLM smoke suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m pytest -q \
            tests/test_nl_parser_smoke.py \
            tests/test_layer3a_smoke.py \
            tests/test_layer3b_smoke.py \
            tests/test_layer4_smoke.py
